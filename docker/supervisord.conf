[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 800x600x24
autorestart=true
priority=10

[program:fluxbox]
command=/usr/bin/fluxbox -display :99
environment=DISPLAY=":99"
autorestart=true
priority=20
startsecs=2

[program:x11vnc]
command=/docker/start-vnc.sh
autorestart=true
priority=30
startsecs=3

[program:novnc]
command=/opt/noVNC/utils/novnc_proxy --vnc localhost:5900 --listen 6080
autorestart=true
priority=40
startsecs=3

[program:flash]
command=/opt/flash/flashplayer /game/pyongyang/PYracer.swf
environment=DISPLAY=":99"
directory=/game/pyongyang
autorestart=true
priority=50
startsecs=5
